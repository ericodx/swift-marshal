default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # Conventional Commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        name: ✓ Check conventional commits
        always_run: true
        stages: [commit-msg]
        args:
          [
            build,
            chore,
            ci,
            docs,
            feat,
            fix,
            perf,
            refactor,
            revert,
            style,
            test,
            "!",
            "(\\w+)",
          ]

  # Core pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: ✓ Validate YAML

      - id: check-json
        name: ✓ Validate JSON

      - id: end-of-file-fixer
        name: ✓ Ensure newline at EOF

      - id: trailing-whitespace
        name: ✓ Trim trailing whitespace

      - id: check-merge-conflict
        name: ✓ Detect merge conflicts

      - id: detect-private-key
        name: ✓ Detect private keys

      - id: check-case-conflict
        name: ✓ Check case conflicts

      - id: mixed-line-ending
        name: ✓ Check line endings
        args: [--fix=lf]

      - id: check-added-large-files
        name: ✓ Check large files
        args: ["--maxkb=1000"]

      - id: no-commit-to-branch
        name: ✓ Prevent commit to main
        args: [--branch, main]

  # Codespell
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        name: ✓ Codespell
        args:
          - "--ignore-words=.codespellignore"
        files: \.(swift|md|ya?ml|json)$

  # SwiftLint
  - repo: https://github.com/realm/SwiftLint
    rev: 0.63.2
    hooks:
      - id: swiftlint
        name: ✓ SwiftLint
        args: ["lint", "--strict", "--quiet"]
        types: [swift]
        pass_filenames: false

  # Swift Format
  - repo: https://github.com/apple/swift-format
    rev: 602.0.0
    hooks:
      - id: swift-format
        name: ✓ Swift Format
        args: ["format", "--in-place", "--parallel"]
        types: [swift]

  # Swift Clone & Pattern Detector
  - repo: https://github.com/ericodx/swift-cpd
    rev: v1.1.0
    hooks:
      - id: swift-cpd
        name: ✓ Swift Clone & Pattern Detector
        args: ["--max-duplication", "0", "Sources"]

  # Local hooks
  - repo: local
    hooks:
      - id: no-coauthor-no-description
        name: ✓ No co-author or description
        entry: "bash -c 'MSG=$(cat \"$1\"); if echo \"$MSG\" | grep -iq \"Co-Authored-By:\"; then echo \"Error: Co-Authored-By is not allowed in commit messages.\" && exit 1; fi; BODY=$(echo \"$MSG\" | sed \"/^#/d\" | tail -n +2 | sed \"/^$/d\"); if [ -n \"$BODY\" ]; then echo \"Error: Description body is not allowed. Use single-line commits only.\" && exit 1; fi' --"
        language: system
        always_run: true
        stages: [commit-msg]
